# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-kernel
tasks:
- id: kernel
  description: Check-mode catalog for kernel plugins.
  targets: all
  tags:
  - all-functions
  - check
  - kernel
  steps:
  - id: catalog
    substeps:
    - id: kernel_boot_param
      use: kernel.boot_param
      with:
        name: nginx
    - id: kernel_boot_param_absent
      use: kernel.boot_param_absent
      with:
        param: quiet
        confirm: true
    - id: kernel_cmdline_assert
      use: kernel.cmdline_assert
      with:
        param: quiet
    - id: kernel_module_blacklist
      use: kernel.module.blacklist
      with:
        module: br_netfilter
    - id: kernel_module_load
      use: kernel.module.load
      with:
        name: br_netfilter
        persist: true
        sudo: true
    - id: kernel_module_persist
      use: kernel.module.persist
      with:
        name: nginx
    - id: kernel_module_status
      use: kernel.module.status
      with:
        module: br_netfilter
    - id: kernel_module_unload
      use: kernel.module.unload
      with:
        name: nginx
