# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-lvm
tasks:
- id: lvm
  description: Check-mode catalog for lvm plugins.
  targets: all
  tags:
  - all-functions
  - check
  - lvm
  steps:
  - id: catalog
    substeps:
    - id: lvm_facts
      use: lvm.facts
      with:
        vg: vg_app
        name: nginx
    - id: lvm_lv_assert
      use: lvm.lv_assert
      with:
        vg: vg_app
        name: nginx
    - id: lvm_lv_extend
      use: lvm.lv_extend
      with:
        vg: vg_app
        name: nginx
        size: 16G
    - id: lvm_lv_present
      use: lvm.lv_present
      with:
        vg: vg_app
        name: nginx
        size: 16G
    - id: lvm_lv_remove
      use: lvm.lv_remove
      with:
        path: /tmp/automax-demo
        confirm: true
    - id: lvm_pv_present
      use: lvm.pv_present
      with:
        device: /dev/sdb
    - id: lvm_pv_remove
      use: lvm.pv_remove
      with:
        device: /dev/sdb
        confirm: true
    - id: lvm_resizefs
      use: lvm.resizefs
      with:
        device: /dev/sdb
        fstype: xfs
    - id: lvm_snapshot
      use: lvm.snapshot
      with:
        vg: vg_app
        source: /var/log/app
        name: nginx
        size: 16G
    - id: lvm_thin_pool
      use: lvm.thin_pool
      with:
        vg: vg_app
        name: nginx
        size: 16G
    - id: lvm_vg_present
      use: lvm.vg_present
      with:
        name: nginx
        devices:
        - /dev/sdb
    - id: lvm_vg_remove
      use: lvm.vg_remove
      with:
        name: nginx
        confirm: true
