# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network-firewall-nftables
tasks:
- id: network_firewall_nftables
  description: Check-mode catalog for network.firewall.nftables plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network-firewall-nftables
  steps:
  - id: catalog
    substeps:
    - id: network_firewall_nftables_apply
      use: network.firewall.nftables.apply
      with:
        src: ./firewall/prod.nft
        sudo: true
    - id: network_firewall_nftables_export
      use: network.firewall.nftables.export
      with:
        family: inet
        table: main
    - id: network_firewall_nftables_list
      use: network.firewall.nftables.list
      with:
        family: inet
        table: main
    - id: network_firewall_nftables_rollback_file
      use: network.firewall.nftables.rollback_file
      with:
        file: /etc/sysctl.d/99-automax.conf
        confirm: true
    - id: network_firewall_nftables_ruleset_assert
      use: network.firewall.nftables.ruleset_assert
      with:
        fragment: table inet
    - id: network_firewall_nftables_validate
      use: network.firewall.nftables.validate
      with:
        content: "table inet automax {\n chain input { type filter hook input priority 0; policy accept; }\n}\n"
