# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network-firewall-ufw
tasks:
- id: network_firewall_ufw
  description: Check-mode catalog for network.firewall.ufw plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network-firewall-ufw
  steps:
  - id: catalog
    substeps:
    - id: network_firewall_ufw_delete
      use: network.firewall.ufw.delete
      with:
        rule: allow
        confirm: true
    - id: network_firewall_ufw_disable
      use: network.firewall.ufw.disable
      with:
        sudo: true
    - id: network_firewall_ufw_enable
      use: network.firewall.ufw.enable
      with:
        sudo: true
    - id: network_firewall_ufw_reset
      use: network.firewall.ufw.reset
      with:
        sudo: true
        confirm: true
    - id: network_firewall_ufw_rule
      use: network.firewall.ufw.rule
      with:
        rule: allow
        port: 22
        protocol: tcp
        from: 10.0.0.0/8
        sudo: true
    - id: network_firewall_ufw_status
      use: network.firewall.ufw.status
      with:
        sudo: true
