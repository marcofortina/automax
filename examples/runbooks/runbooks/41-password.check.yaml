# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-password
tasks:
- id: password
  description: Check-mode catalog for password plugins.
  targets: all
  tags:
  - all-functions
  - check
  - password
  steps:
  - id: catalog
    substeps:
    - id: password_policy
      use: security.password.policy
      with:
        name: automax
        settings:
          minlen: '12'
