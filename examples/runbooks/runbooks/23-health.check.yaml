# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-health
tasks:
- id: health
  description: Check-mode catalog for health plugins.
  targets: all
  tags:
  - all-functions
  - check
  - health
  steps:
  - id: catalog
    substeps:
    - id: health_http
      use: health.http
      with:
        url: https://example.invalid/health
    - id: health_listen
      use: health.listen
      with:
        port: 22
    - id: health_port
      use: health.port
      with:
        port: 22
    - id: health_process
      use: health.process
      with:
        pattern: KEY=.*
