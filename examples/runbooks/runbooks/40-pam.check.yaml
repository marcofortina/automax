# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-pam
tasks:
- id: pam
  description: Check-mode catalog for pam plugins.
  targets: all
  tags:
  - all-functions
  - check
  - pam
  steps:
  - id: catalog
    substeps:
    - id: pam_access
      use: security.pam.access
      with:
        entries:
        - domain: appuser
          type: soft
          item: nofile
          value: 1024
    - id: pam_authselect
      use: security.authselect.check
      with:
        profile: /etc/apparmor.d/usr.sbin.nginx
    - id: pam_backup
      use: security.pam.backup
      with:
        service: sshd
    - id: pam_faillock
      use: security.pam.faillock
      with:
        settings:
          deny: '5'
    - id: pam_include_assert
      use: security.pam.include_check
      with:
        service: sshd
        include: common-auth
    - id: pam_limits
      use: security.pam.limits
      with:
        files:
        - /etc/pam.d/login
    - id: pam_module_assert
      use: security.pam.module_check
      with:
        service: sshd
        module: br_netfilter
    - id: pam_order_assert
      use: security.pam.order_check
      with:
        service: sshd
        before: pam_permit.so
        after: pam_deny.so
    - id: pam_pwhistory
      use: security.pam.pwhistory
      with:
        settings:
          remember: '5'
    - id: pam_restore
      use: security.pam.restore
      with:
        service: sshd
        src: /tmp/source
        confirm: true
    - id: pam_service_line
      use: security.pam.service_line
      with:
        service: sshd
        line: KEY=value
    - id: pam_stack_facts
      use: security.pam.stack.facts
      with:
        service: sshd
        services:
        - sshd
    - id: pam_succeed_if
      use: security.pam.succeed_if
      with:
        service: sshd
        condition: user ingroup wheel
    - id: pam_validate
      use: security.pam.validate
      with:
        service: sshd
        services:
        - sshd
