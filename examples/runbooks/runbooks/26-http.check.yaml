# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-http
tasks:
- id: http
  description: Check-mode catalog for http plugins.
  targets: all
  tags:
  - all-functions
  - check
  - http
  steps:
  - id: catalog
    substeps:
    - id: http_assert
      use: http.assert
      with:
        url: https://example.invalid/health
    - id: http_request
      use: http.request
      with:
        url: https://example.invalid/health
    - id: http_wait
      use: http.wait
      with:
        url: https://example.invalid/health
