# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-fstab
tasks:
- id: fstab
  description: Check-mode catalog for fstab plugins.
  targets: all
  tags:
  - all-functions
  - check
  - fstab
  steps:
  - id: catalog
    substeps:
    - id: fstab_absent
      use: fstab.absent
      with:
        path: /tmp/automax-demo
        source: /var/log/app
        confirm: true
    - id: fstab_assert
      use: fstab.assert
      with:
        path: /tmp/automax-demo
        source: /var/log/app
    - id: fstab_entry
      use: fstab.entry
      with:
        src: /dev/vdb1
        path: /data
        fstype: xfs
        opts: defaults,noatime
        state: present
        sudo: true
    - id: fstab_validate
      use: fstab.validate
      with:
        file: /etc/sysctl.d/99-automax.conf
        sudo: true
