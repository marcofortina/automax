# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-sudo
tasks:
- id: sudo
  description: Check-mode catalog for sudo plugins.
  targets: all
  tags:
  - all-functions
  - check
  - sudo
  steps:
  - id: catalog
    substeps:
    - id: sudo_assert
      use: sudo.assert
      with:
        user: deploy
        rule: allow
    - id: sudo_can_run
      use: sudo.can_run
      with:
        user: deploy
        command: echo automax
    - id: sudo_list
      use: sudo.list
      with:
        user: deploy
    - id: sudo_rule
      use: sudo.rule
      with:
        name: nginx
        subject: Automax notification
    - id: sudo_validate
      use: sudo.validate
      with:
        path: /tmp/automax-demo
        sudo: true
