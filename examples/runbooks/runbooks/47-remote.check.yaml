# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-remote
tasks:
- id: remote
  description: Check-mode catalog for remote plugins.
  targets: all
  tags:
  - all-functions
  - check
  - remote
  steps:
  - id: catalog
    substeps:
    - id: remote_command
      use: remote.command
      with:
        command: systemctl is-active sshd
        success_rc: 0
