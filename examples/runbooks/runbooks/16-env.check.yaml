# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-env
tasks:
- id: env
  description: Check-mode catalog for env plugins.
  targets: all
  tags:
  - all-functions
  - check
  - env
  steps:
  - id: catalog
    substeps:
    - id: env_set
      use: env.set
      with:
        variables:
          APP_HOME: /opt/app
