# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-local
tasks:
- id: local
  description: Check-mode catalog for local plugins.
  targets: all
  tags:
  - all-functions
  - check
  - local
  steps:
  - id: catalog
    substeps:
    - id: local_command
      use: local.command
      with:
        command: echo automax
        changed: false
