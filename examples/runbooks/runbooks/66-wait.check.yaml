# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-wait
tasks:
- id: wait
  description: Check-mode catalog for wait plugins.
  targets: all
  tags:
  - all-functions
  - check
  - wait
  steps:
  - id: catalog
    substeps:
    - id: wait_process
      use: process.wait
      with:
        pattern: KEY=.*
    - id: wait_tcp
      use: network.connectivity.port_wait
      with:
        host: 127.0.0.1
        port: 22
