# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-secret
tasks:
- id: secret
  description: Check-mode catalog for secret plugins.
  targets: all
  tags:
  - all-functions
  - check
  - secret
  steps:
  - id: catalog
    substeps:
    - id: secret_redact_assert
      use: security.secret.redact_check
      with:
        text: password=secret
        value: '1'
    - id: secret_scan_output
      use: security.secret.scan_output
      with:
        text: password=secret
        value: '1'
    - id: secret_scan_preview
      use: security.secret.scan_preview
      with:
        text: password=secret
        value: '1'
