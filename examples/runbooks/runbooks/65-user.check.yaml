# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-user
tasks:
- id: user
  description: Check-mode catalog for user plugins.
  targets: all
  tags:
  - all-functions
  - check
  - user
  steps:
  - id: catalog
    substeps:
    - id: user_create
      use: identity.user.create
      with:
        name: nginx
    - id: user_exists
      use: identity.user.check
      with:
        name: nginx
    - id: user_facts
      use: identity.user.facts
      with:
        user: deploy
    - id: user_groups_assert
      use: identity.user.groups.check
      with:
        user: deploy
        groups:
        - app
    - id: user_home_assert
      use: identity.user.home.check
      with:
        user: deploy
    - id: user_lock
      use: identity.user.lock
      with:
        name: nginx
    - id: user_modify
      use: identity.user.modify
      with:
        name: nginx
    - id: user_remove
      use: identity.user.remove
      with:
        name: nginx
    - id: user_set_password
      use: identity.user.password.set
      with:
        name: automax_smoke_user
        password: "{{ secrets.automax_smoke_user_password }}"
    - id: user_password_expire
      use: identity.user.password.expire
      with:
        name: automax_smoke_user
    - id: user_shell_assert
      use: identity.user.shell.check
      with:
        user: deploy
        shell: /bin/bash
    - id: user_unlock
      use: identity.user.unlock
      with:
        name: nginx
