# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-archive
tasks:
- id: archive
  description: Check-mode catalog for archive plugins.
  targets: all
  tags:
  - all-functions
  - check
  - archive
  steps:
  - id: catalog
    substeps:
    - id: archive_compress
      use: archive.compress
      with:
        source: /var/log/app
        dest: /tmp/automax-demo.gz
        compression: gzip
    - id: archive_decompress
      use: archive.decompress
      with:
        archive: /tmp/app.tar.gz
        dest: /tmp/automax-demo
    - id: archive_tar
      use: archive.tar
      with:
        source: /var/log/app
        dest: /tmp/dest
    - id: archive_untar
      use: archive.untar
      with:
        archive: /tmp/app.tar.gz
        dest: /tmp/dest
    - id: archive_unzip
      use: archive.unzip
      with:
        archive: /tmp/app.tar.gz
        dest: /tmp/dest
    - id: archive_zip
      use: archive.zip
      with:
        source: /var/log/app
        dest: /tmp/dest
