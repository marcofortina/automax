# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network-dns-facts
tasks:
- id: network_dns
  description: Check-mode catalog for network DNS plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network_dns
  steps:
  - id: catalog
    substeps:
    - id: network_dns
      use: network.dns.config
      with:
        backend: auto
        nameservers:
        - 192.0.2.53
    - id: network_dns_facts
      use: network.dns.facts
      with:
        sudo: true
