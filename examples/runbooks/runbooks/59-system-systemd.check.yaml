# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-system-systemd
tasks:
- id: system-systemd
  description: Check-mode catalog for system systemd plugins.
  targets: all
  tags:
  - all-functions
  - check
  - system-systemd
  steps:
  - id: catalog
    substeps:
    - id: system-system_systemd_sysusers
      use: system.systemd.sysusers
      with:
        name: nginx
        content: managed by automax
    - id: system-system_systemd_timer
      use: system.systemd.timer
      with:
        name: nginx
        content: managed by automax
    - id: system-system_systemd_tmpfiles
      use: system.systemd.tmpfiles
      with:
        name: nginx
        content: managed by automax
    - id: system-system_systemd_unit
      use: system.systemd.unit
      with:
        name: nginx
        content: managed by automax
