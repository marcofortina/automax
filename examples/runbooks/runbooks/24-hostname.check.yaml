# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-hostname
tasks:
- id: hostname
  description: Check-mode catalog for hostname plugins.
  targets: all
  tags:
  - all-functions
  - check
  - hostname
  steps:
  - id: catalog
    substeps:
    - id: hostname_set
      use: hostname.set
      with:
        name: nginx
