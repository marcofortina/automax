# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-tool
tasks:
- id: tool
  description: Check-mode catalog for tool plugins.
  targets: all
  tags:
  - all-functions
  - check
  - tool
  steps:
  - id: catalog
    substeps:
    - id: tool_exists
      use: tool.exists
      with:
        name: nginx
    - id: tool_version_assert
      use: tool.version_assert
      with:
        name: sh
        contains: GNU
