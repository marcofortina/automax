# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-auditd
tasks:
- id: auditd
  description: Check-mode catalog for auditd plugins.
  targets: all
  tags:
  - all-functions
  - check
  - auditd
  steps:
  - id: catalog
    substeps:
    - id: auditd_backlog_assert
      use: security.audit.backlog_check
      with: {}
    - id: auditd_reload
      use: security.audit.reload
      with:
        sudo: true
    - id: auditd_rule
      use: security.audit.rule
      with:
        name: nginx
    - id: auditd_rules_facts
      use: security.audit.rules.facts
      with:
        sudo: true
    - id: auditd_search
      use: security.audit.search
      with:
        key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDemo automax@example
        user: deploy
    - id: auditd_status
      use: security.audit.status
      with:
        sudo: true
    - id: auditd_syscall
      use: security.audit.syscall
      with:
        name: openat
        syscalls:
        - openat
        key: automax
    - id: auditd_watch
      use: security.audit.watch
      with:
        name: automax-watch
        path: /tmp/automax-demo
        permissions: rwxa
        key: automax
