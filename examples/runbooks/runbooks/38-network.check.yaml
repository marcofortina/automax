# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network
tasks:
- id: network
  description: Check-mode catalog for network plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network
  steps:
  - id: catalog
    substeps:
    - id: network_bond
      use: network.link.bond
      with:
        name: nginx
        interfaces:
        - eth1
        - eth2
    - id: network_bridge
      use: network.link.bridge
      with:
        name: nginx
    - id: network_dns
      use: network.dns.config
      with:
        backend: auto
        nameservers:
        - 192.0.2.53
    - id: network_dns_assert
      use: network.dns.check
      with:
        nameservers:
        - 192.0.2.53
        search:
        - example.com
    - id: network_interface
      use: network.link.interface
      with:
        name: nginx
    - id: network_link_check
      use: network.link.check
      with:
        name: nginx
    - id: network_link_facts
      use: network.link.facts
      with:
        name: nginx
    - id: network_port_check
      use: network.connectivity.port_check
      with:
        host: 127.0.0.1
        port: 22
    - id: network_route_add
      use: network.route.add
      with:
        dest: default
        gateway: 192.0.2.1
    - id: network_route_remove
      use: network.route.remove
      with:
        dest: 192.0.2.0/24
        dev: eth0
    - id: network_route_check
      use: network.route.check
      with:
        dest: default
        gateway: 192.0.2.1
    - id: network_route_facts
      use: network.route.facts
      with:
        family: inet
    - id: network_vlan
      use: network.link.vlan
      with:
        name: nginx
        parent: eth0
        vlan_id: 100
