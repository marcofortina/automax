# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-download
tasks:
- id: download
  description: Check-mode catalog for download plugins.
  targets: all
  tags:
  - all-functions
  - check
  - download
  steps:
  - id: catalog
    substeps:
    - id: download_file
      use: download.file
      with:
        url: https://example.invalid/health
        dest: /tmp/dest
