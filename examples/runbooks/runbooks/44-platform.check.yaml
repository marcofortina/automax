# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-platform
tasks:
- id: platform
  description: Check-mode catalog for platform plugins.
  targets: all
  tags:
  - all-functions
  - check
  - platform
  steps:
  - id: catalog
    substeps:
    - id: platform_facts
      use: platform.facts
      with:
        sudo: true
