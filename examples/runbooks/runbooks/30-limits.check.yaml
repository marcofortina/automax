# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-limits
tasks:
- id: limits
  description: Check-mode catalog for limits plugins.
  targets: all
  tags:
  - all-functions
  - check
  - limits
  steps:
  - id: catalog
    substeps:
    - id: limits_dropin
      use: limits.dropin
      with:
        name: nginx
        entries:
        - domain: appuser
          type: soft
          item: nofile
          value: 1024
