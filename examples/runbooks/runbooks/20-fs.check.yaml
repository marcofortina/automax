# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-fs
tasks:
- id: fs
  description: Check-mode catalog for fs plugins.
  targets: all
  tags:
  - all-functions
  - check
  - fs
  steps:
  - id: catalog
    substeps:
    - id: fs_acl
      use: fs.acl.set
      with:
        path: /tmp/automax-demo
        acl: u:ubuntu:rw
    - id: fs_acl_assert
      use: fs.acl.check
      with:
        path: /tmp/automax-demo
        acl: u:ubuntu:rw
    - id: fs_acl_get
      use: fs.acl.get
      with:
        path: /tmp/automax-demo
    - id: fs_acl_restore
      use: fs.acl.restore
      with:
        file: /etc/sysctl.d/99-automax.conf
    - id: fs_attr_set
      use: fs.attr.set
      with:
        path: /tmp/automax-demo
        attrs: i
    - id: fs_attr_get
      use: fs.attr.get
      with:
        path: /tmp/automax-demo
    - id: fs_attr_check
      use: fs.attr.check
      with:
        path: /tmp/automax-demo
        attrs: i
    - id: fs_cd
      use: fs.cd
      with:
        path: /tmp/automax-demo
    - id: fs_chmod
      use: fs.permission.mode
      with:
        path: /tmp/automax-demo
        mode: '0644'
    - id: fs_chown
      use: fs.permission.owner
      with:
        path: /tmp/automax-demo
        owner: ubuntu
    - id: fs_copy
      use: fs.object.copy
      with:
        src: /tmp/source
        dest: /tmp/dest
    - id: fs_dir_create
      use: fs.dir.create
      with:
        path: /tmp/automax-demo
    - id: fs_dir_exists
      use: fs.dir.check
      with:
        path: /tmp/automax-demo
    - id: fs_dir_wait
      use: fs.dir.wait
      with:
        path: /tmp/automax-demo
        state: present
        retries: 1
        interval: 1
    - id: fs_file_create
      use: fs.file.create
      with:
        path: /tmp/automax-demo-file
    - id: fs_file_exists
      use: fs.file.check
      with:
        path: /tmp/automax-demo-file
    - id: fs_file_wait
      use: fs.file.wait
      with:
        path: /tmp/automax-demo-file
        state: present
        retries: 1
        interval: 1
    - id: fs_find
      use: fs.object.find
      with:
        path: /tmp/automax-demo
    - id: fs_line
      use: fs.file.line
      with:
        path: /tmp/automax-demo
        line: KEY=value
    - id: fs_move
      use: fs.object.move
      with:
        src: /tmp/source
        dest: /tmp/dest
    - id: fs_read
      use: fs.file.read
      with:
        path: /tmp/automax-demo
    - id: fs_dir_remove
      use: fs.dir.remove
      with:
        path: /tmp/automax-demo
        recursive: true
    - id: fs_file_remove
      use: fs.file.remove
      with:
        path: /tmp/automax-demo-file
    - id: fs_replace
      use: fs.file.replace
      with:
        path: /tmp/automax-demo
        pattern: KEY=.*
        replacement: KEY=new-value
    - id: fs_stat
      use: fs.object.stat
      with:
        path: /tmp/automax-demo
    - id: fs_symlink_create
      use: fs.symlink.create
      with:
        src: /tmp/source
        dest: /tmp/dest
    - id: fs_symlink_exists
      use: fs.symlink.check
      with:
        path: /tmp/automax-demo
    - id: fs_symlink_wait
      use: fs.symlink.wait
      with:
        path: /tmp/automax-demo
        state: present
        retries: 1
        interval: 1
    - id: fs_symlink_remove
      use: fs.symlink.remove
      with:
        path: /tmp/automax-demo
    - id: fs_template
      use: fs.file.template
      with:
        src: ./templates/app.conf.j2
        dest: /etc/myapp/app.conf
        mode: '0644'
        sudo: true
    - id: fs_write
      use: fs.file.write
      with:
        path: /tmp/automax-demo
        content: managed by automax
