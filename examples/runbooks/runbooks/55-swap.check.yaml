# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-swap
tasks:
- id: swap
  description: Check-mode catalog for swap plugins.
  targets: all
  tags:
  - all-functions
  - check
  - swap
  steps:
  - id: catalog
    substeps:
    - id: swap_absent
      use: swap.absent
      with:
        path: /tmp/automax-demo
    - id: swap_present
      use: swap.present
      with:
        path: /tmp/automax-demo
    - id: swap_status
      use: swap.status
      with:
        path: /tmp/automax-demo
        sudo: true
