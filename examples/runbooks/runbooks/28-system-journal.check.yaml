# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-system-journal
tasks:
- id: system-journal
  description: Check-mode catalog for system journal plugins.
  targets: all
  tags:
  - all-functions
  - check
  - system-journal
  steps:
  - id: catalog
    substeps:
    - id: system-system_journal_collect
      use: system.journal.collect
      with:
        service: sshd
        since: 1 hour ago
    - id: system-system_journal_grep
      use: system.journal.grep
      with:
        pattern: KEY=.*
