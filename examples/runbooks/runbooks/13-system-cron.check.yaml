# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-system-cron
tasks:
- id: system-cron
  description: Check-mode catalog for system cron plugins.
  targets: all
  tags:
  - all-functions
  - check
  - system-cron
  steps:
  - id: catalog
    substeps:
    - id: system-system_system_cron_entry_add_remove
      use: system.cron.entry.remove
      with:
        name: nginx
    - id: system-system_cron_entry_add
      use: system.cron.entry.add
      with:
        name: myapp-health
        schedule: '*/5 * * * *'
        user: root
        command: /usr/local/bin/myapp-healthcheck
        sudo: true
    - id: system-system_cron_file
      use: system.cron.file
      with:
        name: automax-smoke
        content: '* * * * * root /bin/true

          '
    - id: system-system_cron_entry_list
      use: system.cron.entry.list
      with:
        user: deploy
        sudo: true
    - id: system-system_cron_validate
      use: system.cron.validate
      with:
        path: /tmp/automax-demo
