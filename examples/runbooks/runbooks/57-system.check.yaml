# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-system
tasks:
- id: system
  description: Check-mode catalog for system plugins.
  targets: all
  tags:
  - all-functions
  - check
  - system
  steps:
  - id: catalog
    substeps:
    - id: system_reboot
      use: system.host.reboot
      with:
        confirm: true
        delay: 3
    - id: system_host_check
      use: system.host.check
    - id: system_host_wait
      use: system.host.wait
      with:
        interval: 5
        timeout: 300
