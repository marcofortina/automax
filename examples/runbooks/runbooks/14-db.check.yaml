# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-db
tasks:
- id: db
  description: Check-mode catalog for db plugins.
  targets: all
  tags:
  - all-functions
  - check
  - db
  steps:
  - id: catalog
    substeps:
    - id: db_health
      use: db.health
      with:
        engine: sqlite
        path: /tmp/automax-demo.sqlite
    - id: db_mysql_query
      use: db.mysql.query
      with:
        connection:
          host: 127.0.0.1
          port: 3306
          user: root
          password: "{{ secrets.mysql_password }}"
          database: mysql
        query: SELECT 1;
    - id: db_oracle_query
      use: db.oracle.query
      with:
        connection:
          dsn: 127.0.0.1/XEPDB1
          user: system
          password: "{{ secrets.oracle_password }}"
        query: SELECT 1 FROM dual
    - id: db_postgres_query
      use: db.postgres.query
      with:
        connection:
          host: 127.0.0.1
          port: 5432
          user: postgres
          password: "{{ secrets.postgres_password }}"
          database: postgres
        query: SELECT 1;
    - id: db_sqlite_query
      use: db.sqlite.query
      with:
        connection:
          path: /tmp/automax.sqlite
        query: SELECT 1 AS value
        output: rows
