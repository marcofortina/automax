# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-login
tasks:
- id: login
  description: Check-mode catalog for login plugins.
  targets: all
  tags:
  - all-functions
  - check
  - login
  steps:
  - id: catalog
    substeps:
    - id: login_defs
      use: login.defs
      with:
        settings:
          PASS_MAX_DAYS: '99999'
