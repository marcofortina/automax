# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-pki
tasks:
- id: pki
  description: Check-mode catalog for pki plugins.
  targets: all
  tags:
  - all-functions
  - check
  - pki
  steps:
  - id: catalog
    substeps:
    - id: pki_ca_install
      use: security.pki.trust.install_ca
      with:
        dest: /tmp/automax-ca.crt
        content: '-----BEGIN CERTIFICATE-----

          -----END CERTIFICATE-----

          '
    - id: pki_cert_expiry_assert
      use: security.pki.cert.expiry_check
      with:
        path: /tmp/automax-demo
    - id: pki_key_permissions
      use: security.pki.key.permissions
      with:
        path: /tmp/automax-demo
