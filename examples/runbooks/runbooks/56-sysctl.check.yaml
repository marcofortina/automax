# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-sysctl
tasks:
- id: sysctl
  description: Check-mode catalog for sysctl plugins.
  targets: all
  tags:
  - all-functions
  - check
  - sysctl
  steps:
  - id: catalog
    substeps:
    - id: sysctl_assert
      use: sysctl.assert
      with:
        name: nginx
        value: 1
    - id: sysctl_dropin
      use: sysctl.dropin
      with:
        name: automax
        settings:
          net.ipv4.ip_forward: '0'
    - id: sysctl_facts
      use: sysctl.facts
      with:
        names:
        - app1.example.com
        - app1
        sudo: true
    - id: sysctl_get
      use: sysctl.get
      with:
        name: nginx
    - id: sysctl_persist
      use: sysctl.persist
      with:
        name: nginx
        value: 1
    - id: sysctl_reload
      use: sysctl.reload
      with:
        file: /etc/sysctl.d/99-automax.conf
        sudo: true
    - id: sysctl_set
      use: sysctl.set
      with:
        name: net.ipv4.ip_forward
        value: '1'
        runtime: true
        persist: true
        file: /etc/sysctl.d/99-automax.conf
        sudo: true
