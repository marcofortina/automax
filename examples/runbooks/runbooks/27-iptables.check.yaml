# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network-firewall-iptables
tasks:
- id: network_firewall_iptables
  description: Check-mode catalog for network.firewall.iptables plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network-firewall-iptables
  steps:
  - id: catalog
    substeps:
    - id: network_firewall_iptables_chain
      use: network.firewall.iptables.chain
      with:
        chain: INPUT
    - id: network_firewall_iptables_counter_assert
      use: network.firewall.iptables.counter_assert
      with:
        chain: INPUT
    - id: network_firewall_iptables_delete
      use: network.firewall.iptables.delete
      with:
        chain: INPUT
        rule: -p tcp --dport 18080 -j ACCEPT
        confirm: true
    - id: network_firewall_iptables_exists_assert
      use: network.firewall.iptables.exists_assert
      with:
        chain: INPUT
        rule: -p tcp --dport 18080 -j ACCEPT
    - id: network_firewall_iptables_list
      use: network.firewall.iptables.list
      with:
        table: main
    - id: network_firewall_iptables_policy
      use: network.firewall.iptables.policy
      with:
        chain: INPUT
        policy: ACCEPT
    - id: network_firewall_iptables_restore
      use: network.firewall.iptables.restore
      with:
        src: /tmp/source
        confirm: true
    - id: network_firewall_iptables_rule
      use: network.firewall.iptables.rule
      with:
        chain: INPUT
        rule: -p tcp --dport 18080 -j ACCEPT
    - id: network_firewall_iptables_save
      use: network.firewall.iptables.save
      with:
        dest: /tmp/dest
