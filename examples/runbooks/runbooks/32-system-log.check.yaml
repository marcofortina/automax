# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-system-log
tasks:
- id: system-log
  description: Check-mode catalog for system log plugins.
  targets: all
  tags:
  - all-functions
  - check
  - system-log
  steps:
  - id: catalog
    substeps:
    - id: system-system_log_export
      use: system.log.export
      with:
        files:
        - /etc/pam.d/login
        service: sshd
    - id: system-system_log_grep
      use: system.log.grep
      with:
        pattern: KEY=.*
