# Check-only plugin catalog. Run with automax run --check, not as a normal runtime job.
apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-smoke-check-network-firewall-firewalld
tasks:
- id: network_firewall_firewalld
  description: Check-mode catalog for network.firewall.firewalld plugins.
  targets: all
  tags:
  - all-functions
  - check
  - network-firewall-firewalld
  steps:
  - id: catalog
    substeps:
    - id: network_firewall_firewalld_forward_port
      use: network.firewall.firewalld.forward_port
      with:
        port: 2222
        to_port: 22
    - id: network_firewall_firewalld_icmp_block
      use: network.firewall.firewalld.icmp_block
      with:
        icmp_type: echo-request
    - id: network_firewall_firewalld_list
      use: network.firewall.firewalld.list
      with:
        zone: public
        permanent: true
    - id: network_firewall_firewalld_masquerade
      use: network.firewall.firewalld.masquerade
      with:
        zone: public
        state: present
    - id: network_firewall_firewalld_port
      use: network.firewall.firewalld.port
      with:
        port: 443
        protocol: tcp
        zone: public
        state: present
        permanent: true
        reload: true
        sudo: true
    - id: network_firewall_firewalld_reload
      use: network.firewall.firewalld.reload
      with:
        sudo: true
    - id: network_firewall_firewalld_rich_rule
      use: network.firewall.firewalld.rich_rule
      with:
        rich_rule: rule family=ipv4 source address=10.0.0.0/8 service name=ssh accept
    - id: network_firewall_firewalld_service
      use: network.firewall.firewalld.service
      with:
        service: sshd
    - id: network_firewall_firewalld_source
      use: network.firewall.firewalld.source
      with:
        source: 10.0.0.0/8
    - id: network_firewall_firewalld_status
      use: network.firewall.firewalld.status
      with:
        sudo: true
    - id: network_firewall_firewalld_zone
      use: network.firewall.firewalld.zone
      with:
        zone: public
