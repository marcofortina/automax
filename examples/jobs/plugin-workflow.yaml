apiVersion: automax.io/v1
kind: Job
metadata:
  name: plugin-workflow-example
tasks:
  - id: filesystem
    targets: group:ssh
    tags: [filesystem]
    steps:
      - id: workspace
        substeps:
          - id: mkdir
            use: fs.dir.create
            with:
              path: /tmp/automax-plugins
              mode: "0755"

          - id: copy
            use: fs.path.copy
            with:
              src: /etc/hosts
              dest: /tmp/automax-plugins/hosts.copy
              overwrite: true

          - id: chmod
            use: fs.permission.mode.set
            with:
              path: /tmp/automax-plugins/hosts.copy
              mode: "0644"

          - id: tar
            use: data.archive.tar.create
            with:
              source: /tmp/automax-plugins
              dest: /tmp/automax-plugins.tar.gz
              compression: gzip

          - id: untar
            use: data.archive.tar.extract
            with:
              archive: /tmp/automax-plugins.tar.gz
              dest: /tmp/automax-plugins-extracted
              creates: /tmp/automax-plugins-extracted/automax-plugins/hosts.copy

          - id: remove
            use: fs.dir.remove
            with:
              path: /tmp/automax-plugins-extracted
              recursive: true

  - id: services
    targets: group:ssh
    tags: [systemd]
    steps:
      - id: systemd
        substeps:
          - id: daemon_reload
            use: system.systemd.daemon.reload
            with:
              sudo: true
