site_name: Automax Documentation
site_description: YAML-driven SSH job automation engine
repo_url: https://github.com/marcofortina/automax
repo_name: marcofortina/automax

theme:
  name: material
  features:
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    primary: teal
    accent: blue

plugins:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Design: NEXT_DESIGN.md
  - Contributing: CONTRIBUTING.md
  - Developer Notes: DEVELOPER-NOTES.md
  - Guides:
    - Creating Plugins: guides/creating-plugins.md
    - Templating: guides/templating.md
  - Plugins:
    - Builtin Plugins: plugins/index.md
  - API Reference: reference/api.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
