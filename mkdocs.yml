site_name: Automax Documentation
site_description: YAML-driven SSH job automation engine
site_author: Marco Fortina
site_url: https://marcofortina.github.io/automax/
edit_uri: edit/master/docs/
use_directory_urls: true
copyright: Copyright (C) 2026 Marco Fortina
repo_url: https://github.com/marcofortina/automax
repo_name: marcofortina/automax

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    primary: teal
    accent: blue

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Execution Model: concepts/execution-model.md
    - Plugin System: concepts/plugin-system.md
  - Guides:
    - Installation: guides/installation.md
    - First Local Job: guides/first-local-job.md
    - First SSH Job: guides/first-ssh-job.md
    - Initialize Workspace: guides/init-workspace.md
    - Operator Diagnostics: guides/doctor.md
    - Development Tooling: guides/development-tooling.md
    - Dynamic Inventory: guides/dynamic-inventory.md
    - Explain Jobs: guides/explain.md
    - Graph Jobs: guides/graph.md
    - Export Runbooks: guides/runbook.md
    - Command Secrets: guides/command-secrets.md
    - Writing Jobs: guides/writing-jobs.md
    - Templating: guides/templating.md
    - Template Workflows: guides/template-workflows.md
    - Creating Plugins: guides/creating-plugins.md
    - Extended SSH Smoke: guides/ssh-smoke.md
    - Publishing Documentation: guides/publishing-docs.md
  - Reference:
    - CLI: reference/cli.md
    - Job DSL: reference/job-dsl.md
    - Inventory, Vars and Secrets: reference/inventory-vars-secrets.md
    - State and Resume: reference/state-and-resume.md
    - Artifacts: reference/artifacts.md
    - Output Formats: reference/output-formats.md
    - Exported Schemas: reference/schemas.md
    - Security: reference/security.md
    - Validation: reference/validation.md
    - Testing and CI: reference/testing-and-ci.md
    - Python Compatibility: reference/python-compatibility.md
    - Python API: reference/api.md
    - Future Work: reference/future-work.md
  - Plugins:
    - Overview: plugins/index.md
    - Generated Reference: plugins/generated.md
    - Commands: plugins/commands.md
    - Filesystem: plugins/filesystem.md
    - Archive: plugins/archive.md
    - Package Manager: plugins/package-manager.md
    - Systemctl: plugins/systemctl.md
    - Users, Groups and Processes: plugins/users-groups-processes.md
    - Transfer: plugins/transfer.md
    - HTTP/API: plugins/http-api.md
    - Wait and Assert: plugins/wait-assert.md
    - Database: plugins/database.md
  - Project:
    - Technical design: TECHNICAL_DESIGN.md
    - Developer Notes: DEVELOPER-NOTES.md
    - Contributing: CONTRIBUTING.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
